<!DOCTYPE html>
<html>
<body>

<h2>My Notes</h2>

<textarea id="note"></textarea>
<button onclick="saveNote()">Save</button>

<ul id="list"></ul>

<script>
const BASE = "https://notes-backend.onrender.com";
const userId = localStorage.getItem("userId");

// ✅ SAVE NOTE
async function saveNote(){
  await fetch(BASE + "/save-note", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      userId,
      text: note.value
    })
  });

  note.value = "";
  loadNotes();
}

// ✅ LOAD NOTES
async function loadNotes(){
  const res = await fetch(BASE + "/get-notes", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({ userId })
  });

  const data = await res.json();

  list.innerHTML = "";
  data.forEach(n=>{
    list.innerHTML += `<li>${n.text}</li>`;
  });
}

loadNotes();
</script>

</body>
</html>
