<!DOCTYPE html>
<html>
<body>

<h2>Signup</h2>
<input id="suser" placeholder="Username">
<input id="spass" type="password" placeholder="Password">
<button onclick="signup()">Signup</button>

<h2>Login</h2>
<input id="luser" placeholder="Username">
<input id="lpass" type="password" placeholder="Password">
<button onclick="login()">Login</button>

<p id="msg"></p>

<script>
const BASE = "https://notes-backend.onrender.com";

// signup
async function signup(){
  const res = await fetch("https://notes-backend.onrender.com/signup", {
  method: "POST",
  headers: { "Content-Type": "application/json" },
  body: JSON.stringify({
    username: suser.value,
    password: spass.value
  })
});

  const data = await res.json();
  msg.innerText = data.message;
}

// login
async function login(){
  const res = await fetch(BASE + "/login", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body:JSON.stringify({
      username:luser.value,
      password:lpass.value
    })
  });

  const data = await res.json();

  if(data.success){
    localStorage.setItem("userId", data.userId);
    window.location = "dashboard.html";
  } else {
    msg.innerText = "Login Failed";
  }
}
</script>

</body>
</html>
